# Inclut toute la stack Signoz (observabilité)
include:
  - signoz-stack/docker/docker-compose.yaml

services:
  minio:
    image: minio/minio:latest
    container_name: arteci-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: arteci-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until (mc alias set local http://minio:9000 minioadmin minioadmin) do echo 'Attente de MinIO...'; sleep 2; done;
      mc mb --ignore-existing local/raw;
      mc mb --ignore-existing local/processeddata;
      echo 'Buckets raw et processeddata prets';
      exit 0;
      "

  api:
    image: landry225/arteci-api:latest
    # Alternative : pour reconstruire depuis le source,
    # commenter "image" et décommenter "build" :
    # build: .
    container_name: arteci-api
    ports:
      - "8001:8000"
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_SECURE: "false"
      MINIO_PROCESSED_BUCKET: processeddata
      OTEL_EXPORTER_OTLP_ENDPOINT: http://signoz-otel-collector:4317
      OTEL_LOG_LEVEL: debug
    depends_on:
      minio-init:
        condition: service_completed_successfully
    networks:
      - default
      - signoz-net
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 8G
        reservations:
          cpus: "2"
          memory: 4G

volumes:
  minio_data:

networks:
  signoz-net:
    name: signoz-net