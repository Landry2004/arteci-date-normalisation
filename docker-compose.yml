services:
  minio:
    image: minio/minio:latest
    container_name: arteci-minio
    ports:
      - "9000:9000"   # API MinIO
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  minio_data: