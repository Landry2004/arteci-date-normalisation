name: CI/CD - ARTECI API

# Déclenche le pipeline à chaque push sur la branche main
on:
  push:
    branches: [main]

jobs:
  # ─── Job 1 : Tests ───────────────────────────────────
  test:
    name: Tests automatisés
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer les tests
        run: pytest tests/ -v

  # ─── Job 2 : Build & Push image Docker ───────────────
  build-and-push:
    name: Build et publication Docker
    runs-on: ubuntu-latest
    needs: test  # Ne s'exécute que si les tests passent
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Authentification DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/arteci-api:latest